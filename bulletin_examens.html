<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulletin d'Examen - Cabinet Médical Lionel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .bulletin {
      width: 148mm;
      min-height: 210mm;
      background: white;
      padding: 8px;
      display: flex;
      flex-direction: column;
      font-size: 10px;
    }

    /* ── EN-TÊTE ── */
    .header-table {
      width: 100%;
      border-collapse: collapse;
      border-bottom: 2.5px solid #2E75B6;
      margin-bottom: 10px;
    }
    .header-table td { vertical-align: middle; padding: 3px; }
    .td-logo { width: 52px; text-align: center; }
    .td-logo img { width: 50px; height: 50px; object-fit: contain; display: block; margin: auto; }
    .td-info { padding-left: 7px; }
    .cabinet-name { font-weight: bold; font-size: 11px; color: #1F4788; }
    .cabinet-sub { font-size: 7px; color: #333; line-height: 1.6; }
    .td-date { text-align: right; vertical-align: middle; padding-right: 3px; white-space: nowrap; font-size: 8.5px; }
    .td-date em { font-style: italic; }
    .dots-gray { color: #CCCCCC; }

    /* ── TITRE ── */
    .title-bulletin {
      text-align: center;
      font-weight: bold;
      font-size: 13px;
      color: #1F4788;
      border: 2px solid #1F4788;
      background: #E8F0F8;
      padding: 4px 0 5px 0;
      margin-top: 20px;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    /* ── CHAMPS PATIENT ── */
    .patient-section {
      border: 1px solid #CCCCCC;
      padding: 7px 9px;
      margin-bottom: 12px;
      font-size: 9px;
    }
    .field-row {
      display: flex;
      align-items: baseline;
      margin-bottom: 7px;
      gap: 4px;
    }
    .field-row:last-child { margin-bottom: 0; }
    .field-label { font-weight: bold; white-space: nowrap; color: #222; }
    .field-input {
      flex: 1;
      border: none;
      border-bottom: 1px dotted #CCCCCC;
      outline: none;
      font-size: 9px;
      font-family: Arial, sans-serif;
      color: #222;
      background: transparent;
      padding: 1px 2px;
      min-width: 0;
    }
    .field-input:focus { border-bottom-color: #1F4788; }

    /* ── SECTIONS CONTENU ── */
    .content-section {
      margin-bottom: 12px;
      flex: 1;
    }
    .section-title {
      font-weight: bold;
      font-size: 9.5px;
      color: #1F4788;
      border-bottom: 1.5px solid #1F4788;
      padding-bottom: 3px;
      margin-bottom: 6px;
    }
    .content-lines {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .content-line {
      width: 100%;
      border: none;
      border-bottom: 1px dotted #CCCCCC;
      outline: none;
      font-size: 9px;
      font-family: Arial, sans-serif;
      color: #222;
      background: transparent;
      padding: 3px 2px;
      min-height: 18px;
    }
    .content-line:focus { border-bottom-color: #1F4788; }

    /* ── PIED ── */
    .footer-section {
      border-top: 1px solid #CCCCCC;
      padding-top: 6px;
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-size: 9px;
    }
    .footer-date {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .footer-date .field-label { font-weight: bold; }
    .footer-date .field-input { width: 90px; flex: none; }
    .footer-prescripteur {
      text-align: center;
      font-weight: bold;
      color: #1F4788;
      text-decoration: underline;
      font-size: 9px;
      padding-top: 35px;
    }
  </style>
</head>
